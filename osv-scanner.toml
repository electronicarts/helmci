[[PackageOverrides]]
name = "rustls-webpki"
version = "0.101.7"
ecosystem = "crates.io"
vulnerability.ignore = true
reason = "Transitive dependency pinned by AWS SDK (aws-smithy-http-client -> hyper-rustls -> rustls 0.21). Not fixable from this crate."

[[PackageOverrides]]
name = "proc-macro-error2"
version = "2.0.1"
ecosystem = "crates.io"
vulnerability.ignore = true
reason = "RUSTSEC-2026-0173: unmaintained advisory, no patched version exists. Used only at compile time (proc-macro) by getset (via oci-spec -> oci-client) and tabled_derive (via tabled). No runtime security impact."
